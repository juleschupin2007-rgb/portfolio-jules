<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio Jules</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#f5efe6;
  --accent:#b89b5e;
  --text:#000;
  --border:#e0d6c8;
  --card:#fff;
  --soft:#eee3d0;
}
*{box-sizing:border-box;font-family:Poppins,sans-serif;}
html{scroll-behavior:smooth;}
body{margin:0;background:var(--bg);color:var(--text);}
.topHeader{background:#000;padding:15px 30px;position:sticky;top:0;z-index:1000;}
.headerContent{display:flex;justify-content:space-between;align-items:center;max-width:1200px;margin:auto;flex-wrap:wrap;gap:12px;}
.leftHeader{display:flex;gap:12px;flex-wrap:wrap;}
.catBtn{padding:8px 16px;background:#000;border:1px solid var(--accent);color:#fff;border-radius:8px;cursor:pointer;}
.catBtn:hover,.catBtn.active{background:var(--accent);}
.searchBox{position:relative;min-width:260px;}
.searchBox input{padding:7px 12px;border-radius:8px;border:1px solid var(--accent);width:100%;}
.suggestions{position:absolute;top:110%;left:0;right:0;background:#fff;border:1px solid var(--border);border-radius:10px;overflow:hidden;box-shadow:0 8px 20px rgba(0,0,0,0.08);display:none;z-index:1200;}
.suggestionItem{padding:10px 12px;cursor:pointer;border-bottom:1px solid #f1ece3;}
.suggestionItem:last-child{border-bottom:none;}
.suggestionItem:hover,.suggestionItem.activeSuggestion{background:var(--soft);}
.backArrow{max-width:1200px;margin:15px auto 0 auto;display:none;}
.backArrow button{background:none;border:none;font-size:16px;color:var(--accent);cursor:pointer;}
.main{width:100%;max-width:1200px;margin:auto;padding:30px 20px;}
.page{display:none;}
.page.active{display:block;}
.banner{background:var(--card);padding:18px;border-radius:10px;border:1px solid var(--border);text-align:center;font-weight:600;font-size:22px;margin-bottom:25px;}
.ctaBlock{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin:25px 0;}
.ctaRow{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
.cta{padding:10px 20px;background:var(--soft);border:1px solid var(--accent);border-radius:8px;text-decoration:none;color:#000;cursor:pointer;}
.cta:hover{background:var(--accent);color:#fff;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:15px;text-align:center;cursor:pointer;overflow:hidden;transition:.25s;}
.card:hover{background:var(--soft);}

/* responsive */
@media(max-width:600px){
  .grid{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<div class="topHeader">
  <div class="headerContent">
    <div class="leftHeader">
      <button class="catBtn active" onclick="showPage('home',this)">Accueil</button>
      <button class="catBtn" onclick="showPage('profile',this)">Profil</button>
      <button class="catBtn" onclick="showPage('projects',this)">Projets</button>
      <button class="catBtn" onclick="showPage('skills',this)">Compétences</button>
      <button class="catBtn" onclick="showPage('contact',this)">Contact</button>
    </div>

    <div class="searchBox">
      <input id="searchInput" type="text" placeholder="Rechercher...">
    </div>
  </div>
</div>

<div class="main">

  <div id="home" class="page active">
    <div class="banner">Bienvenue sur mon portfolio</div>

    <div class="ctaBlock">
      <p style="text-align:center;">
        Je m'appelle Jules, étudiant en licence informatique.
      </p>

      <div class="ctaRow">
        <!-- ✅ BOUTON MODIFIÉ -->
        <a class="cta" href="#" onclick="downloadCV()">Télécharger mon CV</a>
      </div>
    </div>
  </div>

</div>

<script>
function showPage(pageId){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(pageId).classList.add("active");
}

/* ✅ FONCTION CV */
function downloadCV(){
const cv = `<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>CV Jules</title>
<style>
body{font-family:Arial;padding:40px;background:#f5f5f7;}
.container{max-width:900px;margin:auto;background:white;padding:40px;}
h1{font-size:2rem;}
</style>
</head>
<body>
<div class="container">
<h1>Jules Chupin</h1>
<p>Étudiant en informatique passionné par le web et le design.</p>
</div>
</body>
</html>`;

const blob = new Blob([cv], {type:"text/html"});
const url = URL.createObjectURL(blob);

const a = document.createElement("a");
a.href = url;
a.download = "cv.html";
a.click();

URL.revokeObjectURL(url);
}
</script>

</body>
</html>
